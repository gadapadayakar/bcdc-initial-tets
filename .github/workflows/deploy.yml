name: HMS CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        shell: powershell
        run: |
          $tag = "${{ github.sha }}".Substring(0, 7)
          "IMAGE_TAG=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create Kaniko build pod
        shell: powershell
        run: |
          $IMAGE_TAG = "${{ steps.tag.outputs.IMAGE_TAG }}"
          $yamlContent = "apiVersion: v1`nkind: Pod`nmetadata:`n  name: kaniko-build-${{ github.run_number }}`n  namespace: hms`nspec:`n  restartPolicy: Never`n  initContainers:`n  - name: git-clone`n    image: alpine/git:latest`n    command: ['git', 'clone', 'https://github.com/gadapadayakar/bcdc-initial-tets.git', '/workspace']`n    volumeMounts:`n    - name: workspace`n      mountPath: /workspace`n  containers:`n  - name: kaniko`n    image: gcr.io/kaniko-project/executor:latest`n    args:`n    - '--context=/workspace'`n    - '--dockerfile=/workspace/Dockerfile'`n    - '--destination=10.105.137.160/myapp/hms:$IMAGE_TAG'`n    - '--destination=10.105.137.160/myapp/hms:latest'`n    - '--insecure'`n    - '--skip-tls-verify'`n    volumeMounts:`n    - name: workspace`n      mountPath: /workspace`n    - name: harbor-creds`n      mountPath: /kaniko/.docker`n  volumes:`n  - name: workspace`n    emptyDir: {}`n  - name: harbor-creds`n    secret:`n      secretName: harbor-kaniko-secret`n      items:`n      - key: .dockerconfigjson`n        path: config.json"
          $yamlContent | Out-File -FilePath "$env:TEMP\kaniko-pod.yaml" -Encoding utf8
          kubectl apply -f "$env:TEMP\kaniko-pod.yaml" --validate=false

      - name: Wait for Kaniko to finish
        shell: powershell
        run: |
          kubectl wait --for=condition=Ready pod/kaniko-build-${{ github.run_number }} -n hms --timeout=30s
          kubectl wait "--for=jsonpath={.status.phase}=Succeeded" pod/kaniko-build-${{ github.run_number }} -n hms --timeout=300s
          kubectl logs kaniko-build-${{ github.run_number }} -n hms
          kubectl delete pod kaniko-build-${{ github.run_number }} -n hms

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        shell: powershell
        run: |
          $tag = "${{ github.sha }}".Substring(0, 7)
          "IMAGE_TAG=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Deploy to K8s
        shell: powershell
        run: |
          $IMAGE_TAG = "${{ steps.tag.outputs.IMAGE_TAG }}"
          (Get-Content k8s\deployment.yaml) -replace 'IMAGE_TAG', $IMAGE_TAG | Set-Content k8s\deployment.yaml
          kubectl apply -f k8s\namespace.yaml
          kubectl apply -f k8s\pvc.yaml
          kubectl apply -f k8s\deployment.yaml
          kubectl apply -f k8s\service.yaml
          kubectl rollout status deployment/hms -n hms --timeout=120s
