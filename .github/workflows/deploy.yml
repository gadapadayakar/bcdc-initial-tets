name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  SERVICE_NAME: hms-v3
  REGION: asia-south1

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Auth to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      
      - name: Deploy to Cloud Run
        run: gcloud run deploy ${{ env.SERVICE_NAME }} --source . --region ${{ env.REGION }} --allow-unauthenticated --port 8080 --memory 512Mi --set-env-vars "SECRET_KEY=${{ secrets.SECRET_KEY }},APP_ENV=production"

      - name: Get Service URL
        run: gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format "value(status.url)"