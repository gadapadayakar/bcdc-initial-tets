name: HMS CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        shell: bash
        run: |
          echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create Kaniko build pod
        shell: bash
        run: |
          IMAGE_TAG=${{ steps.tag.outputs.IMAGE_TAG }}
          cat > /tmp/kaniko-pod.yaml << EOF
          apiVersion: v1
          kind: Pod
          metadata:
            name: kaniko-build-${{ github.run_number }}
            namespace: hms
          spec:
            restartPolicy: Never
            initContainers:
            - name: git-clone
              image: alpine/git:latest
              command: ["git", "clone", "https://github.com/gadapadayakar/bcdc-initial-tets.git", "/workspace"]
              volumeMounts:
              - name: workspace
                mountPath: /workspace
            containers:
            - name: kaniko
              image: gcr.io/kaniko-project/executor:latest
              args:
              - "--context=/workspace"
              - "--dockerfile=/workspace/Dockerfile"
              - "--destination=10.105.137.160/myapp/hms:${IMAGE_TAG}"
              - "--destination=10.105.137.160/myapp/hms:latest"
              - "--insecure"
              - "--skip-tls-verify"
              volumeMounts:
              - name: workspace
                mountPath: /workspace
              - name: harbor-creds
                mountPath: /kaniko/.docker
            volumes:
            - name: workspace
              emptyDir: {}
            - name: harbor-creds
              secret:
                secretName: harbor-kaniko-secret
                items:
                - key: .dockerconfigjson
                  path: config.json
          EOF
          sed -i 's/^          //' /tmp/kaniko-pod.yaml
          kubectl apply -f /tmp/kaniko-pod.yaml --validate=false

      - name: Wait for Kaniko to finish
        shell: bash
        run: |
          kubectl wait --for=condition=Ready pod/kaniko-build-${{ github.run_number }} -n hms --timeout=30s || true
          kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/kaniko-build-${{ github.run_number }} -n hms --timeout=300s
          kubectl logs kaniko-build-${{ github.run_number }} -n hms
          kubectl delete pod kaniko-build-${{ github.run_number }} -n hms

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        shell: bash
        run: |
          echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Deploy to K8s
        shell: bash
        run: |
          IMAGE_TAG=${{ steps.tag.outputs.IMAGE_TAG }}
          sed -i "s|IMAGE_TAG|${IMAGE_TAG}|g" k8s/deployment.yaml
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/pvc.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/hms -n hms --timeout=120s
