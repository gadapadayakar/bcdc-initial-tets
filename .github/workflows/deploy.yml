- name: Create Kaniko build pod
        run: |
          IMAGE_TAG=${{ steps.tag.outputs.IMAGE_TAG }}
          cat > /tmp/kaniko-pod.yaml << ENDOFYAML
          apiVersion: v1
          kind: Pod
          metadata:
            name: kaniko-build-${{ github.run_number }}
            namespace: hms
          spec:
            restartPolicy: Never
            initContainers:
            - name: git-clone
              image: alpine/git:latest
              command: ["git", "clone", "https://github.com/gadapadayakar/bcdc-initial-tets.git", "/workspace"]
              volumeMounts:
              - name: workspace
                mountPath: /workspace
            containers:
            - name: kaniko
              image: gcr.io/kaniko-project/executor:latest
              args:
              - "--context=/workspace"
              - "--dockerfile=/workspace/Dockerfile"
              - "--destination=10.104.105.226:5000/myapp/hms:${IMAGE_TAG}"
              - "--destination=10.104.105.226:5000/myapp/hms:latest"
              - "--insecure"
              - "--skip-tls-verify"
              volumeMounts:
              - name: workspace
                mountPath: /workspace
              - name: harbor-creds
                mountPath: /kaniko/.docker
            volumes:
            - name: workspace
              emptyDir: {}
            - name: harbor-creds
              secret:
                secretName: harbor-kaniko-secret
                items:
                - key: .dockerconfigjson
                  path: config.json
          ENDOFYAML
          sed -i 's/^          //' /tmp/kaniko-pod.yaml
          kubectl apply -f /tmp/kaniko-pod.yaml