{% extends 'base.html' %}
{% block title %}Admit Patient{% endblock %}
{% block page_title %}Admit Patient (IPD){% endblock %}
{% block content %}
<div class="page-header">
  <div><h1>🛏 Admit Patient to IPD</h1><div class="breadcrumb">IPD / New Admission</div></div>
  <a href="{{ url_for('ipd') }}" class="btn btn-secondary">← Back to IPD</a>
</div>
<div class="card" style="max-width:900px;">
  <div class="card-header"><h3>Admission Details</h3></div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Patient *</label>
          <select name="patient_id" class="form-control" required>
            <option value="">— Select Patient —</option>
            {% for p in patients %}
            <option value="{{ p.id }}">{{ p.patient_unique_id }} — {{ p.patient_name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Doctor in Charge *</label>
          <select name="doctor_id" class="form-control" required>
            <option value="">— Select Doctor —</option>
            {% for d in doctors %}
            <option value="{{ d.id }}">Dr. {{ d.name }} {{ d.surname }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Assign Bed *</label>
          <select name="bed_id" class="form-control" required>
            <option value="">— Select Available Bed —</option>
            {% for b in beds %}
            <option value="{{ b.id }}">{{ b.bed_name }} ({{ b.bed_type or 'General' }}) — ₹{{ b.charge_per_day or 0 }}/day</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Admission Date *</label>
          <input type="date" name="admission_date" class="form-control" value="{{ today }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Admission Charge (₹)</label>
          <input type="number" name="charge" class="form-control" min="0" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label class="form-label">Payment Status</label>
          <select name="payment_status" class="form-control">
            <option value="unpaid">Unpaid / Credit</option>
            <option value="paid">Paid</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Insurance / TPA</label>
          <select name="tpa_id" class="form-control">
            <option value="">None</option>
            {% for t in tpa_list %}
            <option value="{{ t.id }}">{{ t.organisation_name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group mt-3">
        <label class="form-label">Reason for Admission / Diagnosis</label>
        <textarea name="note" class="form-control" rows="2" placeholder="Reason for admission, symptoms, diagnosis..."></textarea>
      </div>
      <div class="flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">🛏 Admit Patient</button>
        <a href="{{ url_for('ipd') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
