{% extends 'base.html' %}
{% block title %}Add Income{% endblock %}
{% block page_title %}Add Income{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1>📈 Record Income</h1><div class="breadcrumb">Finance / Income / Add</div></div>
  <a href="{{ url_for('income_list') }}" class="btn btn-secondary">← Back</a>
</div>
<div class="card" style="max-width:700px;">
  <div class="card-header"><h3>Income Details</h3></div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Income Title / Description *</label>
          <input type="text" name="name" class="form-control" placeholder="e.g. OPD Collection - Morning" required>
        </div>
        <div class="form-group">
          <label class="form-label">Category *</label>
          <select name="income_head_id" class="form-control" required>
            <option value="">— Select Category —</option>
            {% for h in heads %}
            <option value="{{ h.id }}">{{ h.income_head }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Amount (₹) *</label>
          <input type="number" name="amount" class="form-control" min="0" step="0.01" required>
        </div>
        <div class="form-group">
          <label class="form-label">Date *</label>
          <input type="date" name="date" class="form-control" value="{{ today }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Invoice / Receipt Number</label>
          <input type="text" name="invoice_no" class="form-control" placeholder="INV-2025-001">
        </div>
      </div>
      <div class="form-group mt-3">
        <label class="form-label">Notes</label>
        <textarea name="note" class="form-control" rows="2" placeholder="Additional notes..."></textarea>
      </div>
      <div class="flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">💾 Save Income</button>
        <a href="{{ url_for('income_list') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
